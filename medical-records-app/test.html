<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗档案APP - 测试用例</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #0F172A;
            color: #E2E8F0;
            padding: 32px;
            line-height: 1.6;
        }
        h1 { font-size: 28px; font-weight: 700; color: #F59E0B; margin-bottom: 8px; }
        .subtitle { color: #94A3B8; margin-bottom: 24px; font-size: 14px; }
        .summary { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .summary-card {
            padding: 20px 28px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
        }
        .summary-card.pass { background: rgba(34,197,94,0.15); color: #22C55E; border: 1px solid rgba(34,197,94,0.3); }
        .summary-card.fail { background: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
        .summary-card.total { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
        .summary-card.skip { background: rgba(148,163,184,0.15); color: #94A3B8; border: 1px solid rgba(148,163,184,0.3); }
        .summary-card .num { font-size: 32px; display: block; margin-bottom: 4px; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .run-btn {
            background: #F59E0B; color: #0F172A; border: none;
            padding: 12px 28px; border-radius: 9999px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        .run-btn:hover { transform: scale(0.98); }
        .run-btn:active { transform: scale(0.95); }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .filter-btn {
            background: #1E293B; color: #94A3B8; border: 1px solid rgba(148,163,184,0.2);
            padding: 8px 16px; border-radius: 9999px;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { color: #F59E0B; border-color: #F59E0B; }
        .category-tag {
            display: inline-block; font-size: 11px; padding: 2px 8px;
            border-radius: 4px; margin-right: 8px; font-weight: 500;
        }
        .category-tag.unit { background: rgba(59,130,246,0.15); color: #60A5FA; }
        .category-tag.integration { background: rgba(168,85,247,0.15); color: #C084FC; }
        .category-tag.e2e { background: rgba(236,72,153,0.15); color: #F472B6; }
        .category-tag.manual { background: rgba(245,158,11,0.15); color: #F59E0B; }
        .suite {
            margin-bottom: 24px; background: #1E293B;
            border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(148,163,184,0.1);
        }
        .suite-header {
            padding: 16px 20px; font-size: 16px; font-weight: 600;
            color: #F1F5F9; border-bottom: 1px solid rgba(148,163,184,0.1);
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .suite-header:hover { background: rgba(148,163,184,0.05); }
        .suite-header .badge {
            font-size: 12px; padding: 2px 10px;
            border-radius: 9999px; font-weight: 500;
        }
        .suite-header .badge.pass { background: rgba(34,197,94,0.15); color: #22C55E; }
        .suite-header .badge.fail { background: rgba(239,68,68,0.15); color: #EF4444; }
        .suite-header .badge.skip { background: rgba(148,163,184,0.15); color: #94A3B8; }
        .suite-header .arrow { transition: transform 0.2s; font-size: 12px; color: #64748B; }
        .suite-header .arrow.collapsed { transform: rotate(-90deg); }
        .suite-body { overflow: hidden; transition: max-height 0.3s; }
        .suite-body.collapsed { max-height: 0 !important; }
        .test-item {
            padding: 12px 20px; display: flex; align-items: center;
            gap: 12px; font-size: 14px;
            border-bottom: 1px solid rgba(148,163,184,0.05);
        }
        .test-item:last-child { border-bottom: none; }
        .test-icon {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; flex-shrink: 0;
        }
        .test-icon.pass { background: rgba(34,197,94,0.2); color: #22C55E; }
        .test-icon.fail { background: rgba(239,68,68,0.2); color: #EF4444; }
        .test-icon.skip { background: rgba(148,163,184,0.2); color: #94A3B8; }
        .test-name { flex: 1; color: #CBD5E1; }
        .test-name.skip { color: #64748B; text-decoration: line-through; }
        .test-error {
            padding: 8px 20px 12px 54px; font-size: 13px;
            color: #FCA5A5; background: rgba(239,68,68,0.05);
        }
        .test-skip-reason {
            padding: 8px 20px 12px 54px; font-size: 13px;
            color: #94A3B8; background: rgba(148,163,184,0.05);
            font-style: italic;
        }
        .progress-bar {
            height: 4px; background: #1E293B; border-radius: 2px;
            margin-bottom: 24px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: #F59E0B; border-radius: 2px;
            transition: width 0.3s; width: 0%;
        }
    </style>
</head>
<body>
    <h1>医疗档案APP - 测试用例</h1>
    <p class="subtitle">覆盖核心逻辑、AI服务、认证同步的全功能测试 | 最后更新: 2026-04-16</p>

    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>

    <div class="toolbar">
        <button class="run-btn" id="run-btn" onclick="runAllTests()">运行测试</button>
        <button class="filter-btn active" onclick="filterTests('all', this)">全部</button>
        <button class="filter-btn" onclick="filterTests('fail', this)">仅失败</button>
        <button class="filter-btn" onclick="filterTests('skip', this)">待实现</button>
    </div>

    <div class="summary" id="summary" style="display:none;">
        <div class="summary-card total"><span class="num" id="total-count">0</span>总计</div>
        <div class="summary-card pass"><span class="num" id="pass-count">0</span>通过</div>
        <div class="summary-card fail"><span class="num" id="fail-count">0</span>失败</div>
        <div class="summary-card skip"><span class="num" id="skip-count">0</span>待实现</div>
    </div>

    <div id="results"></div>

    <script src="core.js"></script>
    <script src="image-store.js"></script>
    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="sync-service.js"></script>
    <script src="ai-service.js"></script>
    <script>
    var allResults = [];
    var currentFilter = 'all';

    function assert(condition, testName, errorMsg) {
        if (condition) {
            return { pass: true, name: testName };
        }
        return { pass: false, name: testName, error: errorMsg || '断言失败' };
    }

    function assertEqual(actual, expected, testName) {
        var actualStr = JSON.stringify(actual);
        var expectedStr = JSON.stringify(expected);
        if (actualStr === expectedStr) {
            return { pass: true, name: testName };
        }
        return { pass: false, name: testName, error: '期望: ' + expectedStr + '，实际: ' + actualStr };
    }

    function assertIncludes(str, keyword, testName) {
        if (str && str.indexOf(keyword) !== -1) {
            return { pass: true, name: testName };
        }
        return { pass: false, name: testName, error: '字符串 "' + str + '" 不包含 "' + keyword + '"' };
    }

    function assertNotNull(value, testName) {
        if (value !== null && value !== undefined) {
            return { pass: true, name: testName };
        }
        return { pass: false, name: testName, error: '值为 null 或 undefined' };
    }

    function skip(testName, reason) {
        return { pass: 'skip', name: testName, reason: reason || '待实现' };
    }

    function defineSuite(name, category, fn) {
        var tests = [];
        fn(tests);
        allResults.push({ name: name, category: category, tests: tests });
    }

    function runAllTests() {
        allResults = [];
        var btn = document.getElementById('run-btn');
        btn.disabled = true;
        btn.textContent = '测试中...';

        defineAllSuites();

        var totalPass = 0, totalFail = 0, totalSkip = 0;
        allResults.forEach(function(suite) {
            suite.tests.forEach(function(t) {
                if (t.pass === 'skip') totalSkip++;
                else if (t.pass === true) totalPass++;
                else totalFail++;
            });
        });

        var total = totalPass + totalFail + totalSkip;
        document.getElementById('summary').style.display = 'flex';
        document.getElementById('total-count').textContent = total;
        document.getElementById('pass-count').textContent = totalPass;
        document.getElementById('fail-count').textContent = totalFail;
        document.getElementById('skip-count').textContent = totalSkip;
        document.getElementById('progress-fill').style.width = (total > 0 ? Math.round(totalPass / total * 100) : 0) + '%';

        renderResults();

        btn.disabled = false;
        btn.textContent = '重新运行';
    }

    function defineAllSuites() {

        // ============================================================
        // 模块1: core.js - 就诊记录解析
        // ============================================================
        defineSuite('1. 就诊记录解析 parseRecordFromText', 'unit', function(tests) {
            var r1 = MedicalApp.parseRecordFromText('我今天感冒去了华西医院');
            tests.push(assert(r1 !== null, '应返回非null对象'));
            tests.push(assertEqual(r1.hospital, '未知医院', '医院名称不再正则匹配，未由AI提取时应返回未知医院'));
            tests.push(assertEqual(r1.diagnosis, '感冒', '应识别感冒诊断'));
            tests.push(assert(r1.date.match(/^\d{4}-\d{2}-\d{2}$/), '日期格式应为YYYY-MM-DD'));

            var r2 = MedicalApp.parseRecordFromText('去市第一人民医院检查高血压');
            tests.push(assertEqual(r2.hospital, '未知医院', '医院名称不再正则匹配，应返回未知医院'));
            tests.push(assertEqual(r2.diagnosis, '高血压', '应识别高血压'));

            var r3 = MedicalApp.parseRecordFromText('今天胃疼去看了消化内科');
            tests.push(assertEqual(r3.department, '消化内科', '应识别消化内科'));

            var r4 = MedicalApp.parseRecordFromText('随便说点什么');
            tests.push(assertEqual(r4.hospital, '未知医院', '无匹配医院应返回未知医院'));
            tests.push(assertEqual(r4.diagnosis, '', '无匹配诊断应返回空字符串'));

            tests.push(assertEqual(MedicalApp.parseRecordFromText(''), null, '空字符串应返回null'));
            tests.push(assertEqual(MedicalApp.parseRecordFromText(null), null, 'null输入应返回null'));
            tests.push(assertEqual(MedicalApp.parseRecordFromText(undefined), null, 'undefined输入应返回null'));
            tests.push(assertEqual(MedicalApp.parseRecordFromText(123), null, '数字输入应返回null'));

            var r5 = MedicalApp.parseRecordFromText('诊断为大叶性肺炎');
            tests.push(assertEqual(r5.diagnosis, '大叶性肺炎', '应识别"诊断为xxx"格式'));

            var r6 = MedicalApp.parseRecordFromText('在协和医院看骨科，医生：张三');
            tests.push(assertEqual(r6.hospital, '未知医院', '医院名称不再正则匹配，应返回未知医院'));
            tests.push(assertEqual(r6.department, '骨科', '应识别骨科'));
            tests.push(assertEqual(r6.doctor, '张三', '应识别医生姓名'));
        });

        // ============================================================
        // 模块2: core.js - 消息分类
        // ============================================================
        defineSuite('2. 消息分类 classifyMessage', 'unit', function(tests) {
            tests.push(assertEqual(MedicalApp.classifyMessage('我今天感冒去了华西医院'), 'record', '含就诊关键词应分类为record'));
            tests.push(assertEqual(MedicalApp.classifyMessage('去看病了'), 'record', '看病应分类为record'));
            tests.push(assertEqual(MedicalApp.classifyMessage('发烧了'), 'record', '发烧应分类为record'));
            tests.push(assertEqual(MedicalApp.classifyMessage('查询最近一次就诊记录'), 'query', '查询应分类为query'));
            tests.push(assertEqual(MedicalApp.classifyMessage('查看历史记录'), 'query', '查看应分类为query'));
            tests.push(assertEqual(MedicalApp.classifyMessage('删除这条记录'), 'delete', '删除应分类为delete'));
            tests.push(assertEqual(MedicalApp.classifyMessage('把刚才的记录删掉'), 'delete', '删掉应分类为delete'));
            tests.push(assertEqual(MedicalApp.classifyMessage('移除这条就诊信息'), 'delete', '移除应分类为delete'));
            tests.push(assertEqual(MedicalApp.classifyMessage('你好'), 'general', '普通消息应分类为general'));
            tests.push(assertEqual(MedicalApp.classifyMessage(''), 'unknown', '空字符串应分类为unknown'));
            tests.push(assertEqual(MedicalApp.classifyMessage(null), 'unknown', 'null应分类为unknown'));
        });

        // ============================================================
        // 模块3: core.js - 统计计算
        // ============================================================
        defineSuite('3. 统计计算 calculateStats', 'unit', function(tests) {
            tests.push(assertEqual(MedicalApp.calculateStats([]).total, 0, '空记录总数应为0'));
            tests.push(assertEqual(MedicalApp.calculateStats(null).total, 0, 'null输入总数应为0'));
            tests.push(assertEqual(MedicalApp.calculateStats('invalid').total, 0, '非数组输入总数应为0'));

            var today = new Date().toISOString().split('T')[0];
            var testRecords = [
                { id: 1, date: today, hospital: '华西医院', department: '呼吸内科', diagnosis: '感冒' },
                { id: 2, date: today, hospital: '省人民医院', department: '消化内科', diagnosis: '胃炎' },
                { id: 3, date: today, hospital: '市第一人民医院', department: '呼吸内科', diagnosis: '上呼吸道感染' },
                { id: 4, date: today, hospital: '协和医院', department: '心内科', diagnosis: '高血压' }
            ];
            var stats = MedicalApp.calculateStats(testRecords);
            tests.push(assertEqual(stats.total, 4, '4条记录总数应为4'));
            tests.push(assertEqual(stats.halfYear, 4, '近期4条记录半年数应为4'));
            tests.push(assertEqual(stats.topDepartment, '呼吸内科', '热门科室应为呼吸内科'));
            tests.push(assertEqual(stats.diagnosisCounts['感冒'], 1, '感冒诊断次数应为1'));

            var oldDate = '2020-01-01';
            var mixedRecords = [
                { id: 1, date: today, hospital: '华西医院', department: '呼吸内科', diagnosis: '感冒' },
                { id: 2, date: oldDate, hospital: '省人民医院', department: '消化内科', diagnosis: '胃炎' }
            ];
            tests.push(assertEqual(MedicalApp.calculateStats(mixedRecords).halfYear, 1, '仅1条近期记录'));

            var pendingRecords = [
                { id: 1, date: today, hospital: '华西医院', department: '', diagnosis: '' }
            ];
            var pendingStats = MedicalApp.calculateStats(pendingRecords);
            tests.push(assertEqual(pendingStats.topDepartment, '', '无科室信息时热门科室应为空'));
            tests.push(assertEqual(Object.keys(pendingStats.diagnosisCounts).length, 0, '空诊断不应计入统计'));
        });

        // ============================================================
        // 模块4: core.js - 输入验证
        // ============================================================
        defineSuite('4. 输入验证 validatePhone / validateCode / maskPhone', 'unit', function(tests) {
            tests.push(assertEqual(MedicalApp.validatePhone('13812345678'), true, '有效手机号应通过'));
            tests.push(assertEqual(MedicalApp.validatePhone('15000000000'), true, '15开头应通过'));
            tests.push(assertEqual(MedicalApp.validatePhone('02345678901'), false, '0开头应不通过'));
            tests.push(assertEqual(MedicalApp.validatePhone('1381234567'), false, '10位应不通过'));
            tests.push(assertEqual(MedicalApp.validatePhone(''), false, '空字符串应不通过'));
            tests.push(assertEqual(MedicalApp.validatePhone(null), false, 'null应不通过'));

            tests.push(assertEqual(MedicalApp.validateCode('1234'), true, '4位验证码应通过'));
            tests.push(assertEqual(MedicalApp.validateCode('123456'), true, '6位验证码应通过'));
            tests.push(assertEqual(MedicalApp.validateCode('123'), false, '3位应不通过'));
            tests.push(assertEqual(MedicalApp.validateCode(''), false, '空字符串应不通过'));

            tests.push(assertEqual(MedicalApp.maskPhone('13812345678'), '138****5678', '应正确脱敏'));
            tests.push(assertEqual(MedicalApp.maskPhone('123'), '123', '不足11位应原样返回'));
            tests.push(assertEqual(MedicalApp.maskPhone(null), null, 'null应原样返回'));
        });

        // ============================================================
        // 模块5: core.js - 安全与持久化
        // ============================================================
        defineSuite('5. 安全与持久化 escapeHtml / localStorage', 'unit', function(tests) {
            tests.push(assertEqual(MedicalApp.escapeHtml('<script>alert(1)<\/script>'), '&lt;script&gt;alert(1)&lt;/script&gt;', '应转义HTML标签'));
            tests.push(assertEqual(MedicalApp.escapeHtml('正常文本'), '正常文本', '正常文本不应变化'));
            tests.push(assertEqual(MedicalApp.escapeHtml('a & b'), 'a &amp; b', '应转义&符号'));
            tests.push(assertEqual(MedicalApp.escapeHtml(''), '', '空字符串应返回空'));
            tests.push(assertEqual(MedicalApp.escapeHtml(null), '', 'null应返回空'));

            localStorage.removeItem('medicalRecords');
            tests.push(assertEqual(MedicalApp.loadRecords().length, 0, '无存储时加载应为空数组'));

            var today = new Date().toISOString().split('T')[0];
            MedicalApp.saveRecords([{ id: 1, date: today, hospital: '测试医院', diagnosis: '测试诊断' }]);
            var loaded = MedicalApp.loadRecords();
            tests.push(assertEqual(loaded.length, 1, '保存后加载应有1条记录'));
            tests.push(assertEqual(loaded[0].hospital, '测试医院', '保存的医院名称应一致'));

            localStorage.setItem('medicalRecords', 'invalid json');
            tests.push(assertEqual(MedicalApp.loadRecords().length, 0, '无效JSON应返回空数组'));
            localStorage.removeItem('medicalRecords');
        });

        // ============================================================
        // 模块6: core.js - 系统响应生成
        // ============================================================
        defineSuite('6. 系统响应生成 generateSystemResponse', 'unit', function(tests) {
            var today = new Date().toISOString().split('T')[0];
            var testRecords = [
                { id: 1, date: today, hospital: '华西医院', department: '呼吸内科', diagnosis: '感冒' }
            ];

            var r1 = MedicalApp.generateSystemResponse('我今天感冒去了华西医院', testRecords);
            tests.push(assertEqual(r1.type, 'record', '就诊消息响应类型应为record'));
            tests.push(assertIncludes(r1.message, '记录', '响应消息应包含记录关键词'));
            tests.push(assertEqual(r1.record.hospital, '未知医院', '本地降级模式医院名称不再正则匹配'));

            var r2 = MedicalApp.generateSystemResponse('查询最近记录', testRecords);
            tests.push(assertEqual(r2.type, 'query', '查询消息响应类型应为query'));

            var r3 = MedicalApp.generateSystemResponse('你好', testRecords);
            tests.push(assertEqual(r3.type, 'general', '普通消息响应类型应为general'));

            var r4 = MedicalApp.generateSystemResponse('查询记录', []);
            tests.push(assertEqual(r4.type, 'query', '空记录查询类型应为query'));

            var r5 = MedicalApp.generateSystemResponse('删除这条记录', testRecords);
            tests.push(assertEqual(r5.type, 'delete', '删除消息响应类型应为delete'));

            var r6 = MedicalApp.generateSystemResponse('删掉记录', []);
            tests.push(assertEqual(r6.type, 'delete', '空记录删除类型应为delete'));
            tests.push(assertEqual(r6.record, null, '空记录删除时record应为null'));
        });

        // ============================================================
        // 模块7: AI 服务 - 对话接口
        // ============================================================
        defineSuite('7. AI对话服务 AIService.chat', 'integration', function(tests) {
            tests.push(assert(typeof AIService !== 'undefined', 'AIService 应已加载'));
            tests.push(assert(typeof AIService.chat === 'function', 'chat 方法应存在'));
            tests.push(assert(typeof AIService.extractRecord === 'function', 'extractRecord 方法应存在'));
            tests.push(assert(typeof AIService.clearHistory === 'function', 'clearHistory 方法应存在'));
            tests.push(assert(typeof AIService.getHistory === 'function', 'getHistory 方法应存在'));

            tests.push(skip('AI对话 - 发送普通消息应返回自然语言回复', '需要API Key和网络'));
            tests.push(skip('AI对话 - 流式输出应逐chunk回调', '需要API Key和网络'));
            tests.push(skip('AI对话 - 对话历史应正确维护', '需要API Key和网络'));
            tests.push(skip('AI对话 - API不可用时应触发onError回调', '需要模拟API故障'));
        });

        // ============================================================
        // 模块8: AI 服务 - 记录提取
        // ============================================================
        defineSuite('8. AI记录提取 AIService.extractRecord', 'integration', function(tests) {
            tests.push(skip('提取 - "去了华西医院看感冒" 应提取 hospital=华西医院', '需要API Key和网络'));
            tests.push(skip('提取 - "随便聊聊" 应返回 null', '需要API Key和网络'));
            tests.push(skip('提取 - 提取失败时应回调 null', '需要模拟API故障'));
            tests.push(skip('提取 - 返回JSON格式不标准时应容错解析', '需要API Key和网络'));
            tests.push(skip('提取 - is_new_visit默认应为false', '需要API Key和网络'));
            tests.push(skip('提取 - 明确提到另一次就诊时is_new_visit应为true', '需要API Key和网络'));
            tests.push(skip('提取 - complaint应为AI总结的医学术语，非用户原话', '需要API Key和网络'));
            tests.push(skip('提取 - 未识别医院时hospital应为空字符串', '需要API Key和网络'));
            tests.push(skip('提取 - 应提取medication用药信息字段', '需要API Key和网络'));
            tests.push(skip('提取 - 应提取examination检查项目字段', '需要API Key和网络'));
        });

        // ============================================================
        // 模块8.5: 多轮对话记录合并
        // ============================================================
        defineSuite('8.5 多轮对话记录合并 mergeRecordData', 'unit', function(tests) {
            tests.push(assert(typeof MedicalApp.mergeRecordData === 'function', 'mergeRecordData 方法应存在'));

    function renderResults() {
        var html = '';
        allResults.forEach(function(suite, idx) {
            var suitePass = suite.tests.filter(function(t) { return t.pass === true; }).length;
            var suiteFail = suite.tests.filter(function(t) { return t.pass === false; }).length;
            var suiteSkip = suite.tests.filter(function(t) { return t.pass === 'skip'; }).length;
            var allPass = suiteFail === 0;

            var badgeClass = suiteFail > 0 ? 'fail' : (suiteSkip === suite.tests.length ? 'skip' : 'pass');
            var badgeText = suitePass + '/' + suite.tests.length + ' 通过';
            if (suiteSkip > 0) badgeText += ' | ' + suiteSkip + ' 待实现';

            html += '<div class="suite" data-suite-idx="' + idx + '">';
            html += '<div class="suite-header" onclick="toggleSuite(' + idx + ')">';
            html += '<span class="arrow" id="arrow-' + idx + '">&#9660;</span>';
            html += '<span class="category-tag ' + suite.category + '">' + suite.category + '</span>';
            html += suite.name;
            html += ' <span class="badge ' + badgeClass + '">' + badgeText + '</span>';
            html += '</div>';
            html += '<div class="suite-body" id="suite-body-' + idx + '">';

            suite.tests.forEach(function(test) {
                var show = currentFilter === 'all' ||
                           (currentFilter === 'fail' && test.pass === false) ||
                           (currentFilter === 'skip' && test.pass === 'skip');
                if (!show) return;

                if (test.pass === 'skip') {
                    html += '<div class="test-item">';
                    html += '<div class="test-icon skip">-</div>';
                    html += '<span class="test-name skip">' + test.name + '</span>';
                    html += '</div>';
                    html += '<div class="test-skip-reason">' + test.reason + '</div>';
                } else {
                    html += '<div class="test-item">';
                    html += '<div class="test-icon ' + (test.pass ? 'pass' : 'fail') + '">';
                    html += test.pass ? '&#10003;' : '&#10007;';
                    html += '</div>';
                    html += '<span class="test-name">' + test.name + '</span>';
                    html += '</div>';
                    if (!test.pass) {
                        html += '<div class="test-error">' + test.error + '</div>';
                    }
                }
            });

            html += '</div></div>';
        });

        document.getElementById('results').innerHTML = html;
    }

    function toggleSuite(idx) {
        var body = document.getElementById('suite-body-' + idx);
        var arrow = document.getElementById('arrow-' + idx);
        if (body.classList.contains('collapsed')) {
            body.classList.remove('collapsed');
            body.style.maxHeight = body.scrollHeight + 'px';
            arrow.classList.remove('collapsed');
        } else {
            body.classList.add('collapsed');
            arrow.classList.add('collapsed');
        }
    }

    function filterTests(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        if (allResults.length > 0) renderResults();
    }
